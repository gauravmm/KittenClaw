# Which preset to use if --preset isn't passed on the CLI.
default_preset = "cerebras"

# Default. OpenRouter's catch-all `openrouter/free` router picks a free model
# at random and filters for tool-calling support per request. Free signup at
# openrouter.ai gives the key; no model pinning needed.
[models.openrouter-free]
base_url = "https://openrouter.ai/api/v1"
model = "openrouter/free"
max_context_tokens = 24000
max_response_tokens = 4096
api_key = "${OPENROUTER_API_KEY}"

[models.nemotron]
base_url = "https://openrouter.ai/api/v1"
model = "nvidia/nemotron-3-super-120b-a12b:free"
max_context_tokens = 24000
max_response_tokens = 4096
api_key = "${OPENROUTER_API_KEY}"

# Cerebras free tier: 1M tokens/day with an 8K context cap - the small cap
# fits short-context teaching sessions. Free signup at cloud.cerebras.ai; no
# card. gpt-oss-120b is the current free model (their Llama models moved to
# paid). No cached_tokens telemetry.
[models.cerebras]
base_url = "https://api.cerebras.ai/v1"
model = "gpt-oss-120b"
max_context_tokens = 8000
max_response_tokens = 2048
api_key = "${CEREBRAS_API_KEY}"

[models.local-vllm]
base_url = "http://localhost:8000/v1"
model = "Qwen/Qwen2.5-7B-Instruct"
max_context_tokens = 24000
max_response_tokens = 2048
api_key = "not-needed"
